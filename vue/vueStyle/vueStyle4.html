<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>click 이벤트</title>
    <style>
      /* 공통 박스 스타일 */
      .menu-box {
        padding: 16px;
        width: 280px;
        border-radius: 10px;
        margin-top: 20px;
      }

      /* 음식 스타일 */
      .food {
        background-color: #fff3cd;
        color: #856404;
        border: 1px solid #ffeeba;
      }

      /* 음료 스타일 */
      .drink {
        background-color: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <button @click="this.type='food'">음식</button>
      <button @click="this.type='food'">음식</button>
      <button @click="this.type='drink'">음료</button>
      <div class="menu-box" :class="type">현재 선택된 타입 {{type}}</div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
      Vue.createApp({
        data() {
          return {
            type: "food",
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
