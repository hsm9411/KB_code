<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Form Controls Example</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap CSS 연결 -->
  </head>
  <body class="bg-light">
    <!--
  body 전체 배경을 밝은 회색으로 설정합니다.
  흰색 카드나 입력 영역이 더 눈에 잘 띄게 됩니다.
-->

    <div class="container py-5">
      <!--
    container
    -> 가운데 정렬된 콘텐츠 영역

    py-5
    -> 위아래 안쪽 여백을 크게 줍니다.
  -->

      <!--
    text-center : 제목 가운데 정렬
    mb-4        : 제목 아래 여백
  -->

      <div class="card p-4 shadow-sm">
        <h2 class="text mb-4"><i class="fa-solid fa-user-plus"></i>회원가입</h2>
        <!--
      card
      -> 입력폼 전체를 하나의 박스처럼 감싸 줍니다.

      p-4
      -> 카드 안쪽 여백을 넉넉하게 줍니다.

      shadow-sm
      -> 작은 그림자 효과로 카드가 배경에서 살짝 떠 보이게 합니다.
    -->

        <form>
          <!--
        form
        -> 사용자 입력을 받는 영역입니다.
        -> input, textarea, 파일 입력 등을 담습니다.
      -->

          <div class="mb-3">
            <!--
          mb-3
          -> 아래 여백
          -> 각 입력칸 사이 간격을 만듭니다.
        -->

            <label for="username" class="form-label">이름</label>
            <!--
          label
          -> 입력칸에 대한 설명 글자입니다.

          for="username"
          -> id="username" 인 input과 연결됩니다.
          -> label을 클릭해도 해당 입력칸에 포커스가 갑니다.

          form-label
          -> Bootstrap 라벨 스타일
        -->

            <input
              type="text"
              class="form-control"
              id="username"
              placeholder="이름을 입력하세요"
            />
            <!--
          input type="text"
          -> 한 줄짜리 일반 텍스트 입력칸입니다.

          form-control
          -> Bootstrap 입력창 기본 스타일
          -> 너비, 높이, 테두리, 여백 등이 보기 좋게 정리됩니다.

          id="username"
          -> label의 for와 연결됩니다.

          placeholder
          -> 입력 전 흐릿하게 안내 문구를 보여줍니다.
        -->
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">이메일</label>
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="example@email.com"
            />
            <!--
          type="email"
          -> 이메일 형식 입력칸 의미
          -> HTML 기본 검증 시 이메일 형식 체크에 활용될 수 있습니다.
        -->
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">비밀번호</label>
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="비밀번호 입력"
            />
            <!--
          type="password"
          -> 입력한 문자를 숨겨서 표시합니다.
          -> 비밀번호 입력용으로 사용합니다.
        -->
          </div>

          <div class="mb-3">
            <label for="message" class="form-label">자기소개</label>
            <textarea
              class="form-control"
              id="message"
              rows="4"
              placeholder="자기소개를 입력하세요"
            ></textarea>
            <!--
          textarea
          -> 여러 줄 입력이 가능한 입력창입니다.
          -> 자기소개, 문의 내용, 설명 입력 등에 사용합니다.

          rows="4"
          -> 기본 높이를 4줄 정도로 설정합니다.
        -->
          </div>

          <div class="mb-3">
            <label for="file" class="form-label">파일 첨부</label>
            <input class="form-control" type="file" id="file" />
            <!--
          type="file"
          -> 파일 선택 입력칸입니다.
          -> 사용자가 PC에서 파일을 선택할 수 있습니다.
        -->
          </div>

          <button type="submit" class="btn btn-primary">제출</button>
          <!--
        type="submit"
        -> 폼 전송 버튼

        btn btn-primary
        -> Bootstrap 기본 강조 버튼
      -->
        </form>
      </div>
    </div>
  </body>
</html>
