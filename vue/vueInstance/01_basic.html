<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>app과 vm 기본 확인</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
</head>
<body>

<div id="app">
  <h3>app과 vm 확인</h3>
  <p>이름: {{ name }}</p>
  <p>나이: {{ age }}</p>
  <button @click="age++">나이 +1</button>
</div>

<script>
  const { createApp } = Vue

  // ① 애플리케이션 인스턴스 (app)
  //    → 앱 전체 설정을 담당하는 객체
  const app = createApp({
    data() {
      return {
        name: '홍길동',
        age: 25
      }
    }
  })

  // app은 아직 화면과 연결되지 않은 상태
  console.log('app:', app)
  console.log('app.mount 전 → 화면 없음')

  // ② 루트 컴포넌트 인스턴스 (vm)
  //    → mount()의 반환값, 실제 data에 접근 가능
  const vm = app.mount('#app')

  // vm으로 data에 직접 접근 가능
  console.log('vm.name:', vm.name)     // '홍길동'
  console.log('vm.age:', vm.age)       // 25

  // 콘솔에서 직접 테스트해보세요:
  // vm.name = '김영희'   → 화면 즉시 변경
  // vm.age = 30          → 화면 즉시 변경
  console.log('')
  console.log('=== 콘솔에서 테스트 ===')
  console.log('vm.name = "김영희"  → 입력해보세요')
  console.log('vm.age = 30         → 입력해보세요')
</script>

</body>
</html>
