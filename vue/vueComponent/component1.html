<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>component</title>
  </head>
  <body>
    <div id="app">
      <div>
        <h1>여기는 Root의 H1 Element입니다!</h1>
        <!-- <my-global></my-global>
        <my-local></my-local> -->
      </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
      var app = Vue.createApp({
        name: "App",
        data() {
          return {
            message: "소리없는 아우성",
          };
        },
        components: {
          "my-local": {
            name: "my-local",
            data() {
              return {};
            },
            template: "<h2> 지역 component입니다</h2>",
          },
        },
      });

      app.component("my-global", {
        name: "my-global",
        data() {
          return {
            myData: "여기는 Global",
          };
        },
        template: "<h1> 여기는 myGlobal 영역 이예요!!</h1>",
      });

      var vrm = app.mount("#app");
    </script>
  </body>
</html>
