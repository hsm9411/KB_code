<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>component</title>
  </head>
  <body>
    <div id="app">
      <user-component v-bind:user="UserInfo"></user-component>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
      var app = Vue.createApp({
        name: "App",
        data() {
          return {
            UserInfo: {
              name: "홍길동",
              age: 25,
            },
          };
        },
      });

      app.component("user-component", {
        props: {
          user: Object,
        },
        template: `<p>이름: {{ user.name }}</p>
        <p> 나이: {{ user.age }}</p>
        `,
      });

      var vm = app.mount("#app");
    </script>
  </body>
</html>
