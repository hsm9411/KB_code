<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grid Example 5</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container py-5">
      <h2 class="mb-4 text-center">예제 5. 상품 카드 목록</h2>

      <div class="row g-4">
        <div class="col-sm-6 col-lg-4">
          <div class="card h-100 shadow-sm">
            <img
              src="https://picsum.photos/400/200?random=1"
              class="card-img-top"
            />
            <div class="card-body">
              <h5 class="card-title">상품 1</h5>
              <p class="card-text">
                Bootstrap Grid를 활용한 카드형 레이아웃 예제입니다.
              </p>
              <a href="#" class="btn btn-primary">자세히 보기</a>
            </div>
          </div>
        </div>

        <div class="col-sm-6 col-lg-4">
          <div class="card h-100 shadow-sm">
            <img
              src="https://picsum.photos/400/200?random=2"
              class="card-img-top"
            />
            <div class="card-body">
              <h5 class="card-title">상품 2</h5>
              <p class="card-text">화면 크기에 따라 자동 정렬됩니다.</p>
              <a href="#" class="btn btn-success">자세히 보기</a>
            </div>
          </div>
        </div>

        <div class="col-sm-6 col-lg-4">
          <div class="card h-100 shadow-sm">
            <img
              src="https://picsum.photos/400/200?random=3"
              class="card-img-top"
            />
            <div class="card-body">
              <h5 class="card-title">상품 3</h5>
              <p class="card-text">실무에서 많이 사용하는 UI입니다.</p>
              <a href="#" class="btn btn-danger">자세히 보기</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
