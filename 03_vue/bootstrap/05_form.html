<!DOCTYPE html>
<html lang="ko">
<head>
  <title>Bootstrap - Form</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

  <!-- 1. 기본 폼 -->
  <h2>1. 기본 Form</h2>
  <form class="mb-4">
    <div class="mb-3">
      <label class="form-label">이메일</label>
      <input type="email" class="form-control" placeholder="name@example.com">
    </div>
    <div class="mb-3">
      <label class="form-label">비밀번호</label>
      <input type="password" class="form-control">
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="remember">
      <label class="form-check-label" for="remember">로그인 유지</label>
    </div>
    <button type="submit" class="btn btn-primary">로그인</button>
  </form>
  <hr>

  <!-- 2. Input 종류 -->
  <h2>2. Input 종류</h2>
  <form class="mb-4">
    <div class="mb-3">
      <label class="form-label">텍스트</label>
      <input type="text" class="form-control" placeholder="일반 텍스트">
    </div>
    <div class="mb-3">
      <label class="form-label">숫자</label>
      <input type="number" class="form-control" placeholder="숫자만">
    </div>
    <div class="mb-3">
      <label class="form-label">날짜</label>
      <input type="date" class="form-control">
    </div>
    <div class="mb-3">
      <label class="form-label">색상</label>
      <input type="color" class="form-control form-control-color" value="#0d6efd">
    </div>
    <div class="mb-3">
      <label class="form-label">범위 (Range)</label>
      <input type="range" class="form-range">
    </div>
  </form>
  <hr>

  <!-- 3. Select / Textarea -->
  <h2>3. Select / Textarea</h2>
  <form class="mb-4">
    <div class="mb-3">
      <label class="form-label">부서 선택</label>
      <select class="form-select">
        <option selected>선택하세요</option>
        <option>개발팀</option>
        <option>디자인팀</option>
        <option>기획팀</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">내용</label>
      <textarea class="form-control" rows="3" placeholder="내용을 입력하세요"></textarea>
    </div>
  </form>
  <hr>

  <!-- 4. 체크박스 / 라디오 / 스위치 -->
  <h2>4. 체크박스 / 라디오 / 스위치</h2>
  <form class="mb-4">
    <p><strong>체크박스</strong></p>
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="chk1" checked>
      <label class="form-check-label" for="chk1">Java</label>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="chk2">
      <label class="form-check-label" for="chk2">Python</label>
    </div>

    <p class="mt-3"><strong>라디오</strong></p>
    <div class="form-check">
      <input class="form-check-input" type="radio" name="gender" id="r1" checked>
      <label class="form-check-label" for="r1">남</label>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="radio" name="gender" id="r2">
      <label class="form-check-label" for="r2">여</label>
    </div>

    <p class="mt-3"><strong>스위치</strong></p>
    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" id="sw1">
      <label class="form-check-label" for="sw1">알림 받기</label>
    </div>
  </form>
  <hr>

  <!-- 5. Input Group -->
  <h2>5. Input Group</h2>
  <div class="input-group mb-3">
    <span class="input-group-text">@</span>
    <input type="text" class="form-control" placeholder="사용자명">
  </div>
  <div class="input-group mb-3">
    <input type="text" class="form-control" placeholder="검색어">
    <button class="btn btn-primary">검색</button>
  </div>
  <div class="input-group mb-3">
    <span class="input-group-text">가격</span>
    <input type="number" class="form-control">
    <span class="input-group-text">원</span>
  </div>
  <hr>

  <!-- 6. 인라인 폼 -->
  <h2>6. 인라인 Form (한 줄)</h2>
  <form class="row g-3 align-items-center mb-4">
    <div class="col-auto">
      <input type="text" class="form-control" placeholder="이름">
    </div>
    <div class="col-auto">
      <input type="email" class="form-control" placeholder="이메일">
    </div>
    <div class="col-auto">
      <button type="submit" class="btn btn-primary">제출</button>
    </div>
  </form>
  <hr>

  <!-- 7. 유효성 검사 스타일 -->
  <h2>7. 유효성 검사 (Validation)</h2>
  <form class="mb-4">
    <div class="mb-3">
      <label class="form-label">유효한 입력</label>
      <input type="text" class="form-control is-valid" value="홍길동">
      <div class="valid-feedback">올바른 입력입니다.</div>
    </div>
    <div class="mb-3">
      <label class="form-label">잘못된 입력</label>
      <input type="text" class="form-control is-invalid">
      <div class="invalid-feedback">필수 입력 항목입니다.</div>
    </div>
  </form>

  <!-- 8. Floating Label -->
  <h2>8. Floating Label</h2>
  <div class="form-floating mb-3">
    <input type="email" class="form-control" id="floatEmail" placeholder="이메일">
    <label for="floatEmail">이메일</label>
  </div>
  <div class="form-floating mb-3">
    <input type="password" class="form-control" id="floatPw" placeholder="비밀번호">
    <label for="floatPw">비밀번호</label>
  </div>

</div>

</body>
</html>
