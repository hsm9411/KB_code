<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>JavaScript 예제</title>
  </head>
  <body>
    <h2>JavaScript 출력 예제</h2>
    <script>
      console.log("수행 시작");
      console.log(document.writeln("<b>Hi</b><a>Link</a>"));
      // 화면 출력
      document.writeln("ㅋㅋㅋ<br>");

      // 알림창 출력
      alert("자바스크립트를 공부해요!");

      // 숫자 덧셈 결과 출력
      const sum = 100 + 200;
      document.writeln(`100 + 200 = ${sum}<br>`);

      // 비교 연산 결과 출력
      const isGreater = 100 > 200;
      document.writeln(`100 > 200 : ${isGreater}<br>`);
    </script>
  </body>
</html>
