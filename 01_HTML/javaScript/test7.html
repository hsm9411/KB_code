<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Insert title here</title>
  </head>
  <body>
    <script>
      function closerTest(num) {
        let keep = num;
        return function () {
          document.write("<h1>" + ++keep + "</h1>");
        };
      }

      let result1 = closerTest(10);
      result1();
      result1();
    </script>
    <hr />
    <script>
      let result2 = closerTest(100);
      result2();
      result2();
    </script>
  </body>
</html>
