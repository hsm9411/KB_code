<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const add = function (x, y) {
        console.log(x + y);
      };
      add(5, 4);

      function add2(x, y) {
        console.log(x + y);
      }
      add2(5, 4);

      const arrow = (x, y) => {
        console.log(x, y);
      };
      arrow(5, 4);

      function show(callback) {
        callback(5, 9);
      }

      show(function (x, y) {
        console.log(x + y);
      });

      show((x, y) => console.log(x + y));
      
    </script>
  </body>
</html>
