    <hr />

    <h2>정의</h2>

    <p>
      홍차는 중국에서 생산되는 차로, 일반적으로 적색(홍) 차로 알려져 있습니다.
      이 차는 녹차와 흑차와는 달리 발효 과정을 거쳐 만들어집니다.
    </p>

    <h2>등급</h2>

    <p>홍차는 일반적으로 다음과 같은 등급으로 나뉩니다</p>
    <p>- 브로큰 페코</p>
    <p>- 브로큰 페코 수숑</p>
    <p>- 브로큰 오렌지 페코 패닝</p>
