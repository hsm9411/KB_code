<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style type="text/css">
      /* <ul> 요소에 대한 스타일 정의 */
      ul {
        background: lightgray; /* 배경색을 밝은 회색으로 설정 */
        margin: 12px; /* 외부 여백을 12px로 설정 */
        border-style: dotted; /* 테두리 스타일을 점선으로 설정 */
        border-width: medium; /* 테두리 두께를 중간 크기로 설정 */
        border-color: black; /* 테두리 색상을 검정색으로 설정 */
        padding: 3px; /* 내부 여백을 3px로 설정 */
      }
      /* <li> 요소에 대한 기본 스타일 정의 */
      li {
        color: tomato; /* 텍스트 색상을 토마토 색상으로 설정 */
        background: skyblue; /* 배경색을 하늘색으로 설정 */
        border-style: solid; /* 테두리 스타일을 실선으로 설정 */
        margin: 12px; /* 외부 여백을 12px로 설정 */
        padding: 12px; /* 내부 여백을 12px로 설정 */
        list-style: none; /* 불릿 포인트를 제거 */
      }
      /* .withborder 클래스가 적용된 <li> 요소에 대한 추가 스타일 정의 */
      li.withborder {
        border-style: dashed; /* 테두리 스타일을 점선으로 설정 */
        border-width: thick; /* 테두리 두께를 두껍게 설정 */
        border-color: maroon; /* 테두리 색상을 고동색으로 설정 */
      }
    </style>
  </head>
  <body>
    <ul>
      <!-- 첫 번째 리스트 항목 -->
      <li>첫번째 리스트입니다.</li>
      <!-- 두 번째 리스트 항목, .withborder 클래스가 적용 -->
      <li class="withborder">두번째 리스트입니다.</li>
    </ul>
  </body>
</html>
