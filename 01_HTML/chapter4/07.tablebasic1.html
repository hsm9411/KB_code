<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML 테이블 예시</title>
    <style>
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid black;
        padding: 8px;
        text-align: center;
      }
      th {
        background-color: #f2f2f2;
      }
    </style>
  </head>
  <body>
    <h2>테이블 예시</h2>

    <!-- 테이블 전체 너비를 100%로 하고, 테두리 두 줄을 한 줄로 합침(collapse) -->
    <table style="width: 100%; border-collapse: collapse">
      <!-- 테이블 머리글 (제목 부분) -->
      <thead>
        <tr>
          <!-- 각 열의 너비(%)를 제목 칸(th)에서 한 번만 지정해주면 아래 칸들도 다 따라갑니다! -->
          <th
            style="
              width: 20%;
              text-align: left;
              border-bottom: 2px solid #333;
              padding: 10px;
            "
          >
            번호
          </th>
          <th
            style="
              width: 50%;
              text-align: left;
              border-bottom: 2px solid #333;
              padding: 10px;
            "
          >
            게시글 제목
          </th>
          <th
            style="
              width: 30%;
              text-align: left;
              border-bottom: 2px solid #333;
              padding: 10px;
            "
          >
            작성자
          </th>
        </tr>
      </thead>

      <!-- 테이블 본문 (내용 부분) -->
      <tbody>
        <tr>
          <!-- 내용은 따로 width를 주지 않아도 위의 th 비율(20%)을 그대로 따라갑니다 -->
          <td
            style="
              text-align: left;
              border-bottom: 1px solid #ddd;
              padding: 10px;
            "
          >
            1
          </td>
          <td
            style="
              text-align: left;
              border-bottom: 1px solid #ddd;
              padding: 10px;
            "
          >
            HTML style 속성 여러 개 쓰는 법
          </td>
          <td
            style="
              text-align: left;
              border-bottom: 1px solid #ddd;
              padding: 10px;
            "
          >
            김코딩
          </td>
        </tr>
        <tr>
          <td
            style="
              text-align: left;
              border-bottom: 1px solid #ddd;
              padding: 10px;
            "
          >
            2
          </td>
          <td
            style="
              text-align: left;
              border-bottom: 1px solid #ddd;
              padding: 10px;
            "
          >
            세미콜론(;)으로 구분하면 됩니다!
          </td>
          <td
            style="
              text-align: left;
              border-bottom: 1px solid #ddd;
              padding: 10px;
            "
          >
            박개발
          </td>
        </tr>
      </tbody>
    </table>
    <table style="width: 100%">
      <tr>
        <th style="width: 50%">이름</th>
        <th style="width: 25%">나이</th>
        <th style="width: 25%">직업</th>
      </tr>
      <tr>
        <td>홍길동</td>
        <td>30</td>
        <td>개발자</td>
      </tr>
    </table>

    <table>
      <thead>
        <tr>
          <th>이름</th>
          <th>나이</th>
          <th>직업</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>홍길동</td>
          <td>30</td>
          <td>개발자</td>
        </tr>
        <tr>
          <td>이순신</td>
          <td>45</td>
          <td>장군</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="3">총 2명</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
