<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 폼</title>
    <style>
      /* 전체 화면 스타일 */
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(120deg, #6a11cb, #2575fc);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* 로그인 컨테이너 */
      .login-container {
        background: #fff;
        width: 400px;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        animation: fadeIn 1s ease-in-out;
      }

      /* 폼 스타일 */
      .login-form {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .login-form h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }

      /* 입력 필드 스타일 */
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .input-container {
        display: flex;
        align-items: center;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 10px 15px;
        background: #f9f9f9;
      }

      .input-container i {
        margin-right: 10px;
        font-size: 1.2em;
        color: #888;
      }

      input {
        border: none;
        outline: none;
        width: 100%;
        background: transparent;
        font-size: 1em;
        color: #333;
      }

      input::placeholder {
        color: #aaa;
      }

      /* 버튼 스타일 */
      .btn-submit {
        background: linear-gradient(120deg, #6a11cb, #2575fc);
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-size: 1em;
        color: #fff;
        cursor: pointer;
        transition: background 0.3s ease;
      }

      .btn-submit:hover {
        background: linear-gradient(120deg, #2575fc, #6a11cb);
      }

      /* 링크 스타일 */
      .links {
        display: flex;
        justify-content: space-between;
        font-size: 0.9em;
      }

      .links a {
        text-decoration: none;
        color: #6a11cb;
        transition: color 0.3s ease;
      }

      .links a:hover {
        color: #2575fc;
      }

      /* 애니메이션 */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
    <link rel="stylesheet" href="login.css" />
  </head>

  <body>
    <div class="login-container">
      <form class="login-form" action="/login" method="POST">
        <h2>로그인</h2>
        <div class="form-group">
          <label for="username">아이디</label>
          <div class="input-container">
            <i class="fa fa-user"></i>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="아이디를 입력하세요"
              required
            />
          </div>
        </div>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <div class="input-container">
            <i class="fa fa-lock"></i>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="비밀번호를 입력하세요"
              required
            />
          </div>
        </div>
        <button type="submit" class="btn-submit">로그인</button>
        <div class="links">
          <a href="#">비밀번호를 잊으셨나요?</a>
          <a href="#">회원가입</a>
        </div>
      </form>
    </div>
  </body>
</html>
